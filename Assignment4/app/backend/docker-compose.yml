services:
  shard_0:
    image: mysql:latest
    container_name: mysql_shard_0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shard_0_db
    ports:
      - "3301:3307"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql:ro

  shard_1:
    image: mysql:latest
    container_name: mysql_shard_1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shard_1_db
    ports:
      - "3302:3308"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql:ro


  shard_2:
    image: mysql:latest
    container_name: mysql_shard_2
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shard_2_db
    ports:
      - "3303:3309"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql:ro


